<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f0a2e" />
  <meta name="robots" content="noindex" />
  <title>Abrindo ofertas…</title>
  <style>
    html,body{margin:0;padding:0;background:#0f0a2e;color:#c4b5fd;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
    .ring{width:44px;height:44px;border-radius:50%;border:3px solid rgba(196,181,253,.2);border-top-color:#a78bfa;animation:spin .9s linear infinite}
    p{font-size:13px;opacity:.8;margin:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (prefers-reduced-motion: reduce){.ring{animation:none}}
  </style>
</head>
<body>
  <div class="wrap" role="status" aria-live="polite">
    <div class="ring" aria-hidden="true"></div>
    <p>Abrindo ofertas…</p>
  </div>
  <script>
  (function(){
    // Rota curta /d/<brandId> — redireciona instantaneamente para /driver?brandId=...
    // sem inicializar React, providers ou Service Worker. Preserva ?categoryId, ?dealId
    // e qualquer query/hash adicional já presente no link.
    try {
      var path = location.pathname.replace(/\/+$/,"");      // /d/<brandId>
      var parts = path.split("/").filter(Boolean);          // ["d","<brandId>"]
      var brandId = parts[1] || "";
      // Kill-switch único por sessão: se houver SW antigo entregando chunk
      // quebrado, descadastra antes do redirect (custo < 50ms).
      var FLAG = "__d_sw_killed__";
      var killed = sessionStorage.getItem(FLAG);
      function go(){
        if (!brandId) { location.replace("/"); return; }
        var qs = new URLSearchParams(location.search);
        qs.set("brandId", brandId);
        location.replace("/driver?" + qs.toString() + (location.hash || ""));
      }
      if (!killed && "serviceWorker" in navigator) {
        sessionStorage.setItem(FLAG, "1");
        var done = false;
        var fire = function(){ if (done) return; done = true; go(); };
        setTimeout(fire, 400); // teto duro
        Promise.resolve()
          .then(function(){ return navigator.serviceWorker.getRegistrations(); })
          .then(function(regs){ return Promise.all((regs||[]).map(function(r){ return r.unregister().catch(function(){}); })); })
          .then(function(){
            if (typeof caches !== "undefined") {
              return caches.keys().then(function(keys){
                return Promise.all(keys.map(function(k){ return caches.delete(k).catch(function(){}); }));
              });
            }
          })
          .catch(function(){})
          .then(fire);
      } else {
        go();
      }
    } catch (e) {
      location.replace("/");
    }
  })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/" />
    <p>Ative o JavaScript para abrir as ofertas.</p>
  </noscript>
</body>
</html>
