  <body>
    <!-- Bootstrap overlay: OUTSIDE #root so React never touches it -->
    <div id="bootstrap-fallback" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#0f0a2e;flex-direction:column;gap:16px;transition:opacity 300ms ease-out;">
      <svg id="bootstrap-spinner" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6d4aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><style>@keyframes spin{to{transform:rotate(360deg)}}</style></svg>
      <div id="bootstrap-phase" style="display:none;text-align:center;color:#7c6faa;font-family:system-ui,sans-serif;font-size:11px;letter-spacing:0.03em;"></div>
      <div id="bootstrap-error" style="display:none;text-align:center;color:#c4b5fd;font-family:system-ui,sans-serif;padding:0 24px;"></div>
    </div>

    <!-- React mount point: completely empty -->
    <div id="root"></div>

    <!-- Storage shim: prevent SecurityError in iframe/preview environments -->
    <script>
      (function(){
        function makeMemoryStorage(){
          var s={};
          return {
            getItem:function(k){return s.hasOwnProperty(k)?s[k]:null},
            setItem:function(k,v){s[k]=String(v)},
            removeItem:function(k){delete s[k]},
            clear:function(){s={}},
            key:function(i){return Object.keys(s)[i]||null},
            get length(){return Object.keys(s).length}
          };
        }
        try{var t='__st__';window.localStorage.setItem(t,t);window.localStorage.removeItem(t)}catch(e){
          console.warn('localStorage indisponível, usando fallback em memória');
          try{Object.defineProperty(window,'localStorage',{value:makeMemoryStorage(),writable:true})}catch(e2){window.localStorage=makeMemoryStorage()}
        }
        try{var t2='__ss__';window.sessionStorage.setItem(t2,t2);window.sessionStorage.removeItem(t2)}catch(e){
          console.warn('sessionStorage indisponível, usando fallback em memória');
          try{Object.defineProperty(window,'sessionStorage',{value:makeMemoryStorage(),writable:true})}catch(e2){window.sessionStorage=makeMemoryStorage()}
        }
      })();
    </script>

    <!-- Safety timeout: show reload button with boot phase diagnostic -->
    <script>
      window.__bootstrapDismissed=false;
      window.__dismissBootstrap=function(){
        if(window.__bootstrapDismissed)return;
        window.__bootstrapDismissed=true;
        var el=document.getElementById('bootstrap-fallback');
        if(!el)return;
        el.style.opacity='0';
        el.style.pointerEvents='none';
        setTimeout(function(){if(el&&el.parentNode)el.parentNode.removeChild(el)},350);
      };

      /* Progresso intermediário: mostra fase amigável após 4s */
      var phaseLabels={
        ENTRY_LOADING:'preparando ambiente…',
        MAIN_MODULE_START:'carregando módulos…',
        BOOTSTRAP:'iniciando aplicação…',
        AUTH_LOADING:'verificando sessão…',
        BRAND_LOADING:'carregando configurações…',
        BRAND_READY:'quase pronto…',
        APP_MOUNTED:'pronto'
      };
      setTimeout(function(){
        if(window.__bootstrapDismissed)return;
        var phaseEl=document.getElementById('bootstrap-phase');
        if(!phaseEl)return;
        phaseEl.style.display='block';
        phaseEl.textContent=phaseLabels[window.__BOOT_PHASE__]||'preparando…';
        var iv=setInterval(function(){
          if(window.__bootstrapDismissed){clearInterval(iv);return}
          phaseEl.textContent=phaseLabels[window.__BOOT_PHASE__]||'preparando…';
        },1000);
      },4000);

      /* Timeout de segurança: botão de reload após 18s */
      setTimeout(function(){
        if(window.__bootstrapDismissed)return;
        var el=document.getElementById('bootstrap-fallback');
        if(!el)return;
        var phase=window.__BOOT_PHASE__||'desconhecido';
        var spinner=document.getElementById('bootstrap-spinner');
        var phaseEl=document.getElementById('bootstrap-phase');
        var err=document.getElementById('bootstrap-error');
        if(spinner)spinner.style.display='none';
        if(phaseEl)phaseEl.style.display='none';
        if(err){
          err.style.display='block';
          err.innerHTML='<p style="margin:0 0 8px;font-size:13px;color:#a78bfa;">'+(phaseLabels[phase]||phase)+'</p>'
            +'<p style="margin:0 0 12px;font-size:14px;">O carregamento está demorando mais que o esperado.</p>'
            +'<button onclick="window.location.reload()" style="background:#6d4aff;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;">Recarregar</button>';
        }
      },18000);
    </script>

    <script>
      window.__BOOT_PHASE__="ENTRY_LOADING";

      /* Normalização de /index → / antes do import */
      (function(){
        var p=window.location.pathname;
        if(p==="/index"||p==="/index.html"||p==="/index/"){
          window.history.replaceState(null,"","/"+window.location.search+window.location.hash);
        }
      })();
    </script>
    <script type="module">
      (function(){
        var TIMEOUT_MS=15000;

        function showFatalError(){
          window.__BOOT_PHASE__="ENTRY_IMPORT_FAILED";
          var spinner=document.getElementById("bootstrap-spinner");
          var errDiv=document.getElementById("bootstrap-error");
          if(spinner)spinner.style.display="none";
          if(errDiv){
            errDiv.style.display="block";
            errDiv.innerHTML='<p style="margin:0 0 8px;font-size:13px;color:#a78bfa;">Não foi possível conectar ao servidor</p>'
              +'<p style="margin:0 0 12px;font-size:14px;">Verifique sua conexão e tente novamente.</p>'
              +'<button onclick="window.location.reload()" style="background:#6d4aff;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;">Tentar novamente</button>';
          }
        }

        var timeout=setTimeout(function(){
          console.error("[boot] import timeout");
          showFatalError();
        },TIMEOUT_MS);

        import("/src/main.tsx").then(function(){
          clearTimeout(timeout);
        }).catch(function(err){
          clearTimeout(timeout);
          console.error("[boot] import failed",err);
          showFatalError();
        });
      })();
    </script>
  </body>
