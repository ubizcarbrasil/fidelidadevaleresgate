  <body>
    <!-- Bootstrap overlay: OUTSIDE #root so React never touches it -->
    <div id="bootstrap-fallback" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#0f0a2e;flex-direction:column;gap:16px;">
      <svg id="bootstrap-spinner" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6d4aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><style>@keyframes spin{to{transform:rotate(360deg)}}</style></svg>
      <div id="bootstrap-error" style="display:none;text-align:center;color:#c4b5fd;font-family:system-ui,sans-serif;padding:0 24px;">
        <p style="margin:0 0 12px;font-size:14px;">O carregamento está demorando mais que o esperado.</p>
        <button onclick="window.location.reload()" style="background:#6d4aff;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;">Recarregar</button>
      </div>
    </div>

    <!-- React mount point: completely empty -->
    <div id="root"></div>

    <!-- Storage shim: prevent SecurityError in iframe/preview environments -->
    <script>
      (function(){
        function makeMemoryStorage(){
          var s={};
          return {
            getItem:function(k){return s.hasOwnProperty(k)?s[k]:null},
            setItem:function(k,v){s[k]=String(v)},
            removeItem:function(k){delete s[k]},
            clear:function(){s={}},
            key:function(i){return Object.keys(s)[i]||null},
            get length(){return Object.keys(s).length}
          };
        }
        try{var t='__st__';window.localStorage.setItem(t,t);window.localStorage.removeItem(t)}catch(e){
          console.warn('localStorage indisponível, usando fallback em memória');
          try{Object.defineProperty(window,'localStorage',{value:makeMemoryStorage(),writable:true})}catch(e2){window.localStorage=makeMemoryStorage()}
        }
        try{var t2='__ss__';window.sessionStorage.setItem(t2,t2);window.sessionStorage.removeItem(t2)}catch(e){
          console.warn('sessionStorage indisponível, usando fallback em memória');
          try{Object.defineProperty(window,'sessionStorage',{value:makeMemoryStorage(),writable:true})}catch(e2){window.sessionStorage=makeMemoryStorage()}
        }
      })();
    </script>

    <!-- Safety timeout: show reload button if app doesn't mount in 10s -->
    <script>
      window.__APP_MOUNTED__=false;
      window.__dismissBootstrap=function(){
        var el=document.getElementById('bootstrap-fallback');
        if(el)el.style.display='none';
      };
      setTimeout(function(){
        if(!window.__APP_MOUNTED__){
          var spinner=document.getElementById('bootstrap-spinner');
          var err=document.getElementById('bootstrap-error');
          if(spinner)spinner.style.display='none';
          if(err)err.style.display='block';
        }
      },10000);
    </script>

    <script type="module" src="/src/main.tsx"></script>
