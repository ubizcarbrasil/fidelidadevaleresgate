  <body>
    <!-- Bootstrap overlay — removed by main.tsx on successful mount -->
    <div id="bootstrap-fallback" style="position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#0f0a2e;flex-direction:column;gap:16px;transition:opacity 300ms ease-out;">
      <svg id="bootstrap-spinner" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6d4aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/><style>@keyframes spin{to{transform:rotate(360deg)}}</style></svg>
      <div id="bootstrap-phase" style="display:none;text-align:center;color:#7c6faa;font-family:system-ui,sans-serif;font-size:11px;letter-spacing:0.03em;"></div>
      <div id="bootstrap-error" style="display:none;text-align:center;color:#c4b5fd;font-family:system-ui,sans-serif;padding:0 24px;"></div>
    </div>

    <div id="root"></div>

    <script>
      (function(){
        function m(){var s={};return{getItem:function(k){return s.hasOwnProperty(k)?s[k]:null},setItem:function(k,v){s[k]=String(v)},removeItem:function(k){delete s[k]},clear:function(){s={}},key:function(i){return Object.keys(s)[i]||null},get length(){return Object.keys(s).length}};}
        try{var t='__st__';window.localStorage.setItem(t,t);window.localStorage.removeItem(t)}catch(e){try{Object.defineProperty(window,'localStorage',{value:m(),writable:true})}catch(e2){window.localStorage=m()}}
        try{var t2='__ss__';window.sessionStorage.setItem(t2,t2);window.sessionStorage.removeItem(t2)}catch(e){try{Object.defineProperty(window,'sessionStorage',{value:m(),writable:true})}catch(e2){window.sessionStorage=m()}}
      })();
    </script>

    <script>
      window.__BOOT_PHASE__ = "BOOT_HTML_READY";
      window.__bootstrapDismissed = false;

      window.__dismissBootstrap = function(){
        if(window.__bootstrapDismissed) return;
        window.__bootstrapDismissed = true;
        var el = document.getElementById('bootstrap-fallback');
        if(!el) return;
        el.style.opacity = '0';
        el.style.pointerEvents = 'none';
        setTimeout(function(){ if(el && el.parentNode) el.parentNode.removeChild(el); }, 350);
      };

      window.__showBootError = function(phase, detail){
        window.__BOOT_PHASE__ = phase;
        console.error('[boot] ' + phase, detail);
        var spinner = document.getElementById('bootstrap-spinner');
        var phaseEl = document.getElementById('bootstrap-phase');
        var err = document.getElementById('bootstrap-error');
        if(spinner) spinner.style.display = 'none';
        if(phaseEl) phaseEl.style.display = 'none';
        if(err){
          err.style.display = 'block';
          err.innerHTML = '<p style="margin:0 0 8px;font-size:11px;color:#7c6faa;">' + phase + '</p>'
            + '<p style="margin:0 0 12px;font-size:14px;">' + (detail || 'Erro ao carregar a aplicação.') + '</p>'
            + '<button onclick="window.location.reload()" style="background:#6d4aff;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;cursor:pointer;">Recarregar</button>';
        }
      };

      (function(){
        var p = window.location.pathname;
        if(p === "/index" || p === "/index.html" || p === "/index/"){
          window.history.replaceState(null, "", "/" + window.location.search + window.location.hash);
        }
      })();

      (function(){
        try{
          if('caches' in window) caches.keys().then(function(k){k.forEach(function(key){if(/workbox|vite|pwa|precache/i.test(key))caches.delete(key)})}).catch(function(){});
        }catch(e){}
      })();

      setTimeout(function(){
        if(window.__bootstrapDismissed || window.__APP_MOUNTED__) return;
        var phase = window.__BOOT_PHASE__ || 'desconhecida';
        if(phase === 'APP_IMPORT_START' || phase === 'AUTH_LOADING' || phase === 'BRAND_LOADING'){
          setTimeout(function(){
            if(window.__bootstrapDismissed || window.__APP_MOUNTED__) return;
            window.__showBootError('TIMEOUT', 'A aplicação não carregou a tempo. Fase: ' + (window.__BOOT_PHASE__ || 'desconhecida'));
          }, 20000);
          return;
        }
        window.__showBootError('TIMEOUT', 'A aplicação não carregou a tempo. Fase: ' + phase);
      }, 25000);
    </script>

    <script type="module">
      window.__BOOT_PHASE__ = "ENTRY_IMPORT_START";
      console.info("[boot] ENTRY_IMPORT_START");
      var v = document.querySelector('meta[name="app-version"]');
      var ver = v ? v.getAttribute('content') : Date.now();
      import("/src/main.tsx?v=" + ver).catch(function(e){
        console.error("[boot] ENTRY_IMPORT_FAILED", e);
        if(typeof window.__showBootError === "function"){
          window.__showBootError("ENTRY_IMPORT_FAILED", e && e.message ? e.message : String(e));
        }
      });
    </script>
  </body>
